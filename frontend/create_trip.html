{% extends "base.html" %}

{% block content %}
<h2>Post a Trip</h2>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class="flash-messages">
      {% for message in messages %}
        <li>{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<form method="POST" action="{{ url_for('trips.create_trip') }}" class="trip-form">

  <label for="title">Trip Title</label>
  <input type="text" id="title" name="title" required>

  <label for="destination">Destination</label>
  <input type="text" id="destination" name="destination" required>

  <label for="departure_time">Departure Time</label>
  <input type="datetime-local" id="departure_time" name="departure_time" required>

  <label for="category">Category</label>
  <select id="category" name="category">
    {% for cat in categories %}
      <option value="{{ cat }}">{{ cat|capitalize }}</option>
    {% endfor %}
  </select>

  <label for="available_seats">Seats Available</label>
  <input type="number" id="available_seats" name="available_seats" min="1" value="1">

  <label for="cost">Cost per Passenger ($)</label>
  <input type="number" id="cost" name="cost" min="0" step="0.01" value="0">

  <label for="description">Description</label>
  <textarea id="description" name="description" rows="3"></textarea>

  <label class="checkbox-label">
    <input type="checkbox" id="round_trip" name="round_trip">
    This is a round trip
  </label>

  <button type="submit">Post Trip</button>
</form>
{% endblock %}
